<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="lg" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#4A90FF"/>
      <stop offset="100%" stop-color="#1232BE"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="50%" cy="48%" r="52%">
      <stop offset="0%" stop-color="#2D6FE8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2D6FE8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fundo -->
  <rect width="1024" height="1024" rx="200" fill="#0A0A0F"/>
  <rect width="1024" height="1024" rx="200" fill="url(#bg-glow)"/>

  <!-- ══ LETRA R ══ -->

  <!-- Barra vertical (cantos esquerdos arredondados) -->
  <path d="M 168,108 A 58,58 0 0,0 110,166
           L 110,818
           A 58,58 0 0,0 168,876
           L 268,876 L 268,108 Z"
        fill="url(#lg)"/>

  <!-- Barriga exterior -->
  <path d="M 268,108 L 600,108
           A 215,215 0 0,1 600,538
           L 268,538 Z"
        fill="url(#lg)"/>

  <!-- Buraco da barriga (counter) -->
  <path d="M 268,194 L 516,194
           A 129,129 0 0,1 516,452
           L 268,452 Z"
        fill="#0A0A0F"/>

  <!-- Perna diagonal -->
  <polygon points="268,538 448,538 848,876 668,876" fill="url(#lg)"/>


  <!-- ══ ÁTOMO dentro do counter ══ -->
  <g transform="translate(450, 323)" opacity="0.68">
    <circle cx="0" cy="0" r="13" fill="#A8CCFF"/>
    <ellipse cx="0" cy="0" rx="68" ry="24"
             fill="none" stroke="#A8CCFF" stroke-width="4" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="68" ry="24"
             fill="none" stroke="#A8CCFF" stroke-width="4" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="68" ry="24"
             fill="none" stroke="#A8CCFF" stroke-width="4" transform="rotate(120)"/>
  </g>


  <!-- ══ WORDMARK ══ -->
  <text x="490" y="960"
        text-anchor="middle"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="76"
        letter-spacing="10"
        fill="#4A85F0">RUNLAB</text>

</svg>
